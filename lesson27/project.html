<!DOCTYPE html>
<html>
<head>
    <title>My School Events</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: aliceblue;
            text-align: center;
            padding: 30px;
        }
        h1 {
            color: #ff5a43;
        }
        button {
            background: #ff5a43;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }
        div {
            border: 1px solid #ff5a43;
            width: 250px;
            margin: 6px auto;
            padding: 8px 12px;
            text-align: left;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <h1>My School Events</h1>
    <button onclick="saveEventRegistration()">
        Save Event
    </button>
    </button>
    <div>JSON Text: <span id="json-text"></span></div>
    <div>Loaded Event: <span id="loaded-event"></span></div>
    <div>Loaded Price: <span id="loaded-price"></span></div>
    <script>

        let order = {
            item: "Prom",
            price: 100,
            message: "Sign Up for Prom"
        };

        function saveEventRegistration() {
            let jsonText = JSON.stringify(order);
            let loadedOrder = JSON.parse(jsonText);
            document.getElementById("json-text").innerHTML =
                jsonText;
            document.getElementById("loaded-event").innerHTML =
                loadedOrder.item;
            document.getElementById("loaded-price").innerHTML =
                "$" + loadedOrder.price;
        }
    </script>
</body>
</html>
