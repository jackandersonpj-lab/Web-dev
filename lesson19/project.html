<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript String Methods</h2>
        <p>Basic Methods</p>
        <p id="demo"></p>
        <script>
        var str = "JaVa" ;
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write(str.startsWith('i'));
        document.write("<br>");
        
       var JAVA = ["loop", "condition", "variable", "string", "break", "comment", "title"];
    var text = "";
    var i;
    for (i = 0; i < JAVA.length; i++) {text += JAVA[i] + "<br>";}
    document.getElementById("demo").innerHTML = text;
        </script>
    </body>
</html>
