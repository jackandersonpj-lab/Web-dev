<!DOCTYPE html>
<html lang="en">

<head>
    <title>School Website</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/996973c893.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;500;600;700;800&family=Roboto+Slab:wght@200;400;600;900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navigation -->
    <div class="container navigation pt-3">
        <div class="row">
            <div class="col-6 d-flex justify-content-start align-items-center">
                <i class="fas fa-school fa-2x text-warning"></i>
                <h5 class="d-inline pl-2">High School</h5>
            </div>

            <div class="col-6 pt-2">
                <div class="row text-center">
                    <div class="col-3">
                        <a href="#" class="navigation-link">About</a>
                    </div>
                    <div class="col-3">
                        <a href="#" class="navigation-link">Academics</a>
                    <div class="col-3">
                        <a href="#" class="navigation-link">Events</a                    <div class="col-3">
                        <a href="#" class="navigation-link">Contact</a>
                    </div
                </div>
            </div>
        </div>
    </div>

    <!-- Programs -->
    <div id="Programs" class="container mt-5 pt-5">
        <h1 class="text-warning mb-3 pb-2">School Programs</h1>

        <div class="row">

            <div class="col-4 mb-5">
                <div class="card" style="width: 18rem;">
                    <img src="messaging.svg" class="card-img-top" style="height: 13rem;" alt="Science">
                    <div class="card-body">
                        <h5 class="card-title">Science Department</h5>
                        <p class="card-text">
                            Learn biology, chemistry, and physics.
                        </p>
                        <a href="#" class="btn btn-warning">Learn More</a>
                    </div>
                </div>
            </div>

            <div class="col-4 mb-5">
                <div class="card" style="width: 18rem;">
                    <img src="fitness.svg" class="card-img-top" style="height: 13rem;" alt="Sports">
                    <div class="card-body">
                        <h5 class="card-title">Sports Program</h5>
                        <p class="card-text">
                            Join school sports teams and activities.
                        </p>
                        <a href="#" class="btn btn-warning">Learn More</a>
                    </div>
                </div>
            </div>

            <div class="col-4 mb-5">
                <div class="card" style="width: 18rem;">
                    <img src="web_scraping.svg" class="card-img-top" style="height: 13rem;" alt="Arts">
                    <div class="card-body">
                        <h5 class="card-title">Fine Arts</h5>
                        <p class="card-text">
                            Explore music, theater, and visual arts.
                        </p>
                        <a href="#" class="btn btn-warning">Learn More</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
