<html>
    <body>
        <p>every element in the array with random numbers:</p>

        <p id="product_value"></p>

        <script>
        var numbers = [2, 5, 6, 7, 9, 25, 67, 69];

        function myFunction(num) {
            return num * 10;
            return num + 67123;
            return num - 25;
        }

        var newarray = numbers.map(myFunction);

        document.getElementById("product_value").innerHTML = newarray;
    </script>
    </body>
</html>
